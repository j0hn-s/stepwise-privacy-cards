services:
  css:
    # Community Solid Server (CSS) is the W3C-aligned reference implementation
    # of the Solid Protocol. See https://github.com/CommunityGroup/community-server
    image: solidproject/community-server:7.1.7
    container_name: flta-css
    ports:
      - "3000:3000"
    command: >
      -c /config/dynamic-pods.json
      --baseUrl http://localhost:3000/
      --port 3000
    volumes:
      - ./css-config:/config:ro
      - css-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  css-data:
    driver: local
